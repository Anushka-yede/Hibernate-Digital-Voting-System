services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: secure_voting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
    ports:
      - '8000:8000'

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
      - ai-service
      - ganache
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/secure_voting?options=-c%20TimeZone%3DUTC
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      JWT_SECRET: VGhpc0lzQVNlY3VyZVZvdGluZ0pXVFNlY3JldEtleUZvckRlbW9QdXJwb3NlczEyMzQ=
      JWT_EXPIRATION_MS: 3600000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      ETH_RPC_URL: http://ganache:8545
      ETH_PRIVATE_KEY: ${ETH_PRIVATE_KEY:-}
      ETH_CONTRACT_ADDRESS: ${ETH_CONTRACT_ADDRESS:-}
      AI_SERVICE_URL: http://ai-service:8000
      WS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:3000
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - '5173:80'

  ganache:
    image: trufflesuite/ganache:latest
    ports:
      - '7545:8545'
    command: >
      --wallet.totalAccounts 10
      --wallet.defaultBalance 1000
      --chain.chainId 1337

volumes:
  pg_data:
